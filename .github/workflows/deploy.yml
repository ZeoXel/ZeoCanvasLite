name: Deploy to VPS

on:
  push:
    branches: [studio]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: crpi-dj1plh5tmmlskal3.cn-hangzhou.personal.cr.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: crpi-dj1plh5tmmlskal3.cn-hangzhou.personal.cr.aliyuncs.com/studio1111/studio:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_USE_GATEWAY_PROXY=true
            NEXT_PUBLIC_GATEWAY_PROXY_BASE=/api/gateway
            NEXT_PUBLIC_ASSIGNED_KEY_TTL_MS=86400000
            NEXT_PUBLIC_ENABLE_MASTER_CODE=false

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            cd /root/data/disk/studio
            docker login crpi-dj1plh5tmmlskal3.cn-hangzhou.personal.cr.aliyuncs.com -u ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }}
            docker compose pull app
            docker compose up -d --force-recreate --no-deps app
            docker image prune -f --filter "until=72h"
            # 等待容器启动后验证健康状态（最多等 60 秒）
            echo "Waiting for app to be healthy..."
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Status}}' $(docker compose ps -q app) 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "running" ]; then
                echo "Container is running."
                exit 0
              fi
              echo "Attempt $i: status=$STATUS, retrying in 5s..."
              sleep 5
            done
            echo "ERROR: Container failed to start or is unhealthy"
            docker compose logs --tail=30 app
            exit 1
